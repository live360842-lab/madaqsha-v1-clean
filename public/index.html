<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#090d18" />
  <title>مداقشة</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div id="toast" class="toast" hidden></div>

  <main id="loginScreen" class="screen login-screen">
    <section class="hero-card">
      <div class="brand-mark">م</div>
      <h1>مداقشة</h1>
      <p>لعبة ورق عربية أونلاين بنقاط افتراضية فقط، مصممة للجوال أولًا.</p>
      <div class="account-box">
        <input id="playerName" placeholder="اسم اللاعب" maxlength="32" />
        <button id="localLoginBtn" class="primary">دخول محلي للتجربة</button>
        <button id="googleLoginBtn">Google Login تجريبي</button>
        <button id="profileBtn" disabled>ملف اللاعب</button>
        <button id="logoutBtn" disabled>تسجيل خروج</button>
      </div>
    </section>

    <section class="lobby-grid">
      <div class="panel">
        <h2>إنشاء مجلس</h2>
        <input id="roomName" placeholder="اسم المجلس" value="مجلس مداقشة" />
        <div class="row two">
          <select id="roomType"><option value="public">عام</option><option value="private">خاص</option></select>
          <select id="roomSeats"><option value="4">4 لاعبين</option><option value="6">6 لاعبين</option></select>
        </div>
        <div class="row two">
          <select id="cardsPerPlayer"><option value="4">4 أوراق</option><option value="8">8 أوراق</option></select>
          <input id="initialBalance" type="number" value="50000" min="1000" />
        </div>
        <div class="row two">
          <input id="minBid" type="number" value="250" min="50" />
          <input id="minRaise" type="number" value="250" min="50" />
        </div>
        <button id="createRoomBtn" class="primary">إنشاء مجلس جديد</button>
      </div>

      <div class="panel">
        <h2>الدخول لمجلس</h2>
        <input id="joinCode" placeholder="كود المجلس" />
        <button id="joinRoomBtn" class="primary">دخول كلاعب</button>
        <button id="spectateBtn">دخول كمشاهد</button>
      </div>

      <div class="panel list-panel">
        <h2>الغرف العامة</h2>
        <div id="publicRooms" class="list empty">لا توجد غرف عامة بعد.</div>
      </div>

      <div class="panel list-panel">
        <h2>لوحة الترتيب</h2>
        <div id="leaderboard" class="list empty">لا توجد نتائج بعد.</div>
      </div>
    </section>
  </main>

  <main id="gameScreen" class="screen game-screen" hidden>
    <header class="game-header">
      <div><strong>مداقشة</strong><span id="roomMeta">—</span></div>
      <div class="connection">● متصل</div>
      <button id="menuBtn" class="menu-btn">القائمة</button>
    </header>

    <section class="table-zone">
      <div id="seatLayer" class="seat-layer"></div>
      <div class="majlis-table">
        <div class="table-glow"></div>
        <div id="tableCenter" class="table-center"></div>
      </div>
      <div id="bidLadder" class="bid-ladder" hidden></div>
      <div id="myHand" class="my-hand"></div>
    </section>

    <section id="decisionPanel" class="decision-panel"></section>

    <aside id="sideDrawer" class="side-drawer" hidden>
      <div class="drawer-head">
        <strong>قائمة المجلس</strong>
        <button id="closeDrawerBtn">إغلاق</button>
      </div>
      <nav class="tabs">
        <button data-tab="chat" class="active">الدردشة</button>
        <button data-tab="queue">الانتظار</button>
        <button data-tab="rank">الترتيب</button>
        <button data-tab="events">السجل</button>
        <button data-tab="admin">الإدارة</button>
        <button data-tab="report">التقرير</button>
      </nav>
      <div id="drawerContent" class="drawer-content"></div>
    </aside>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/client.js"></script>
  <script src="/pwa.js"></script>
</body>
</html>
